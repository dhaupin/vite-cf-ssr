<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    Shell template. Do not add brand meta here directly.

    inject-brand.js populates these tags at build time from ssr.config.js:
      <title>, description, author, keywords, canonical,
      Open Graph, Twitter Card, JSON-LD.

    The placeholder values below give the inject regex something to match.
    They are replaced before the site is deployed -- never served as-is.
  -->

  <!-- Primary SEO (populated by inject-brand.js) -->
  <title>Site</title>
  <meta name="description" content="" />
  <meta name="keywords"    content="" />
  <meta name="author"      content="" />
  <meta name="robots"      content="index, follow" />
  <link rel="canonical"    href="https://yoursite.com/" />

  <!--
    Favicons -- replace with your own.
    Generate from https://favicon.io or similar.
  -->
  <!-- <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" /> -->
  <!-- <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> -->
  <!-- <link rel="manifest" href="/site.webmanifest" /> -->

  <!--
    Fonts -- add your font imports here if needed.
    Use <link rel="preconnect"> to warm the connection before the stylesheet.
  -->
</head>
<body>
  <div id="root"></div>
</body>
</html>
