# wrangler.toml
# =============
# Cloudflare Worker configuration for the Prestruct render proxy.
# Copy to your Worker project root and fill in the blanks.
#
# Required steps:
#   1. Replace "your-kv-namespace-id" below (run `wrangler kv namespace create CACHE`).
#   2. Set your target site URL in [vars].
#   3. Run `wrangler secret put PRESTRUCT_SECRET` to set the cache-refresh secret.
#   4. Run `wrangler deploy`.

name       = "prestruct-proxy"
main       = "scripts/proxy.worker.js"
compatibility_date = "2024-09-23"

[[browser]]
binding = "BROWSER"

[[kv_namespaces]]
binding = "CACHE"
id      = "your-kv-namespace-id"

[vars]
# URL of the site the proxy renders. No trailing slash.
# Can be your CF Pages URL, a WordPress origin, localhost tunnel, etc.
PRESTRUCT_TARGET_URL = "https://yoursite.com"

# Cache TTL in seconds. 86400 = 24 hours.
CACHE_TTL_SECONDS = "86400"

# PRESTRUCT_SECRET is set via `wrangler secret put PRESTRUCT_SECRET`
# and is never stored in this file.
