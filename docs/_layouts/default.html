<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <style>
    :root { --primary: #0969da; --bg: #ffffff; --text: #24292f; --muted: #57606a; --border: #d0d7de; --code-bg: #f6f8fa; }
    @media (prefers-color-scheme: dark) { :root { --bg: #0d1117; --text: #c9d1d9; --muted: #8b949e; --border: #30363d; --code-bg: #161b22; } }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 0; }
    header { background: linear-gradient(135deg, var(--primary) 0%, #1f6feb 100%); padding: 2rem; color: white; text-align: center; }
    header h1 { margin: 0; font-size: 2rem; }
    main { max-width: 800px; margin: 0 auto; padding: 2rem; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 1rem; overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid var(--primary); margin: 1.5rem 0; padding: 0.5rem 1rem; background: var(--code-bg); color: var(--muted); }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
    th { background: var(--code-bg); }
    .guide-cards { display: grid; gap: 1rem; margin: 1.5rem 0; }
    .guide-cards a { display: block; padding: 1rem; border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; }
    .guide-cards a:hover { border-color: var(--primary); text-decoration: none; transform: translateY(-2px); }
  </style>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
  </header>
  <main>
    {{ content }}
  </main>
</body>
</html>
