<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f8f8f6">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
*,*:before,*:after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--bg-1:#0e0e0e;--bg-2:#141414;--border:#1e1e1e;--border-2:#2a2a2a;--text:#e2e0db;--text-2:#8a8680;--text-3:#4a4845;--accent:#c8f000;--accent-dim:#8aaa00;--font:"Geist",system-ui,sans-serif;--mono:"Geist Mono",ui-monospace,monospace;--radius:4px;--max:860px}
:root[data-theme=light]{--bg:#f8f8f6;--bg-1:#f2f2ef;--bg-2:#eaeae8;--border:#d8d8d4;--border-2:#c8c8c4;--text:#1a1a18;--text-2:#5a5a58;--text-3:#8a8a88;--accent:#8aaa00;--accent-dim:#c8f000}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px)}
.app{display:flex;flex-direction:column;min-height:100vh}
.site-header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between}
@media(min-width:601px){.site-header{backdrop-filter:blur(12px);background:rgba(8,8,8,.92)}}
.header-actions{display:flex;align-items:center;gap:.5rem}
.header-wordmark{font-family:var(--mono);font-size:.82rem;font-weight:600;color:var(--text);letter-spacing:.02em;display:flex;align-items:center;gap:.5rem;text-decoration:none}
.header-wordmark:hover{text-decoration:none;color:var(--accent)}
.wordmark-docs{font-size:.65rem;font-weight:500;letter-spacing:.1em;color:var(--text-3);margin-left:.25rem}
.nav{display:flex;align-items:center;gap:.25rem}
.nav-link{font-family:var(--mono);font-size:.75rem;font-weight:400;color:var(--text-2);letter-spacing:.04em;padding:.35rem .75rem;border-radius:var(--radius);transition:color .15s,background .15s;text-decoration:none}
.nav-link:hover{color:var(--text);background:var(--bg-2);text-decoration:none}
.nav-link.active{color:var(--accent)}
.nav-github{font-family:var(--mono);font-size:.72rem;color:var(--text-3);padding:.35rem .75rem;border:1px solid var(--border-2);border-radius:var(--radius);margin-left:.5rem;display:flex;align-items:center;gap:.4rem;transition:color .15s,border-color .15s;text-decoration:none}
.nav-github:hover{color:var(--text);border-color:var(--text-3);text-decoration:none}
.theme-toggle{display:flex;background:none;border:1px solid var(--border-2);border-radius:var(--radius);color:var(--text-3);cursor:pointer;width:32px;height:32px;align-items:center;justify-content:center;transition:color .15s,border-color .15s}
.theme-toggle:hover{color:var(--text);border-color:var(--text-3)}
.theme-toggle .icon-sun,.theme-toggle .icon-moon{display:none}
[data-theme=light] .theme-toggle .icon-sun{display:block}
[data-theme=dark] .theme-toggle .icon-moon{display:block}
.main{flex:1}
.container{max-width:var(--max);margin:0 auto;padding:0 2rem}
.page-hero{padding:3.5rem 0 3rem;border-bottom:1px solid var(--border)}
.page-heading{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:1rem}
.page-sub{font-size:1rem;color:var(--text-2);line-height:1.7;max-width:520px}
.prose{max-width:680px}
.prose h1{font-size:clamp(1.8rem,4vw,2.4rem);font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:1rem}
.prose h2{font-size:1.2rem;font-weight:600;margin:2rem 0 1rem;letter-spacing:-.01em}
.prose h3{font-size:1rem;font-weight:600;margin:1.5rem 0 .75rem}
.prose p{color:var(--text-2);line-height:1.7;margin-bottom:1rem}
.prose ul,.prose ol{margin:1rem 0 1rem 1.5rem;color:var(--text-2)}
.prose li{margin-bottom:.5rem}
.prose a{color:var(--accent);text-decoration:none}
.prose a:hover{text-decoration:underline}
.prose code,.prose pre{font-family:var(--mono);font-size:.85em;background:var(--bg-2);border:1px solid var(--border-2);border-radius:var(--radius);padding:.15em .45em;color:var(--accent)}
.prose pre{padding:1.25rem 1.5rem;overflow-x:auto;font-size:.82rem;line-height:1.7}
.prose pre code{background:none;border:none;padding:0}
.prose blockquote{background:var(--bg-1);border:1px solid var(--border-2);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;font-size:.9rem;color:var(--text-2);margin:1.5rem 0}
.prose table{width:100%;border-collapse:collapse;margin:1.5rem 0}
.prose th,.prose td{border:1px solid var(--border);padding:.75rem 1rem;text-align:left;font-size:.9rem}
.prose th{background:var(--bg-2);font-weight:600}
.prose td{color:var(--text-2)}
.site-footer{border-top:1px solid var(--border);padding:2rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem}
.footer-legal{font-family:var(--mono);font-size:.72rem;color:var(--text-3);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.footer-legal a{color:var(--text-3);transition:color .15s}
.footer-legal a:hover{color:var(--text);text-decoration:none}
.footer-creadev{opacity:.6;transition:opacity .15s}
.footer-creadev:hover{opacity:1}
.footer-creadev img{width:48px;height:48px;object-fit:contain;vertical-align:middle}
.nav-toggle{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;padding:0;background:transparent;border:1px solid var(--border-2);border-radius:var(--radius);cursor:pointer}
.nav-toggle span{display:block;width:14px;height:1px;background:var(--text-2);transition:transform .2s,opacity .2s}
.nav-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.nav-toggle.open span:nth-child(2){opacity:0}
.nav-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
@media(max-width:600px){
  .site-header,.container{padding:0 1rem}
  .nav-toggle{display:flex}
  .nav{display:none;position:absolute;top:52px;left:0;right:0;flex-direction:column;background:var(--bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.5rem 0;z-index:9}
  .nav.open{display:flex}
  .nav-link{padding:.65rem 1.25rem;border-radius:0}
  .nav-github{margin:.25rem 1rem 0;justify-content:center}
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
*{scrollbar-width:thin;scrollbar-color:var(--border-2) var(--bg)}
  </style>
</head>
<body>
  <div class="app">
    <header class="site-header">
      <a href="{{ site.baseurl }}/" class="header-wordmark">
        <span class="wordmark-slash">[</span>pre<span class="wordmark-accent">struct</span><span class="wordmark-bracket">]</span><span class="wordmark-docs">docs</span>
      </a>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
      <nav class="nav" id="nav">
        <a href="{{ site.baseurl }}/" class="nav-link">home</a>
        <a href="{{ site.baseurl }}/guides/seo" class="nav-link">seo</a>
        <a href="{{ site.baseurl }}/guides/performance" class="nav-link">performance</a>
        <a href="{{ site.baseurl }}/guides/routing" class="nav-link">routing</a>
        <a href="https://github.com/dhaupin/prestruct" class="nav-github" target="_blank" rel="noopener">github</a>
      </nav>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </header>
    
    <main class="main">
      <div class="container">
        <div class="page-hero">
          <h1 class="page-heading">{{ page.title }}</h1>
        </div>
        <div class="prose">
          {{ content }}
        </div>
      </div>
    </main>
    
    <footer class="site-footer">
      <div class="footer-legal">
        <a href="https://github.com/dhaupin/prestruct">github</a>
        <a href="{{ site.baseurl }}/guides/seo">seo</a>
        <a href="{{ site.baseurl }}/guides/performance">performance</a>
        <a href="{{ site.baseurl }}/guides/routing">routing</a>
      </div>
      <div class="footer-creadev">
        <a href="https://creadev.org">Built by <img src="/creadev-logoset-67h.png" alt="Creadev" title="Creadev"></a>
      </div>
    </footer>
  </div>
  
  <script>
    document.getElementById('navToggle').addEventListener('click',function(){
      document.getElementById('nav').classList.toggle('open');
      this.classList.toggle('open');
    });
    var path=window.location.pathname.replace('{{ site.baseurl }}','')||'/';
    document.querySelectorAll('.nav-link').forEach(function(a){
      if(a.getAttribute('href').replace('{{ site.baseurl }}','')===path)a.classList.add('active');
    });
    // Theme toggle
    var toggle=document.getElementById('themeToggle');
    var html=document.documentElement;
    toggle.addEventListener('click',function(){
      var current=html.getAttribute('data-theme');
      var next=current==='light'?'dark':'light';
      html.setAttribute('data-theme',next);
      localStorage.setItem('theme',next);
    });
    // Load saved theme
    var saved=localStorage.getItem('theme');
    if(saved)html.setAttribute('data-theme',saved);
  </script>
</body>
</html>
