# prestruct docs configuration
# GitHub Pages will auto-render this with Jekyll

title: prestruct
description: Static site generation for Cloudflare Pages - Documentation
baseurl: "/prestruct"
url: "https://dhaupin.github.io"
show_downloads: false

# Navigation structure
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /guides/getting-started
  - title: Guides
    folder: guides
    items:
      - title: Configuration
        url: /guides/config
      - title: React Integration
        url: /guides/react
      - title: Vite Integration
        url: /guides/vite
      - title: Cloudflare Pages
        url: /guides/cloudflare
      - title: SEO Guide
        url: /guides/seo
      - title: Performance
        url: /guides/performance
      - title: Routing
        url: /guides/routing
      - title: Architecture
        url: /guides/architecture
      - title: API Reference
        url: /guides/api
      - title: Troubleshooting
        url: /guides/troubleshooting
      - title: Migration Guide
        url: /guides/migration
  - title: GitHub
    url: https://github.com/dhaupin/prestruct
    external: true

# Theme - GitHub Pages default
theme: jekyll-theme-minimal

# Use default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Use pretty URLs (/page/ instead of /page.html)
permalink: pretty

# Markdown config
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge