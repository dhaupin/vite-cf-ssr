# prestruct docs configuration
# GitHub Pages will auto-render this with Jekyll

title: prestruct
description: Static site generation for Cloudflare Pages - Documentation
baseurl: "/prestruct"
url: "https://docs.creadev.org"
show_downloads: false

# Navigation structure
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /guides/getting-started
  - title: Guides
    folder: guides
    items:
      - title: Configuration
        url: /guides/config
      - title: Vite Integration
        url: /guides/vite
      - title: CLI Reference
        url: /guides/cli
      - title: Cloudflare Pages
        url: /guides/cloudflare
      - title: Redirects
        url: /guides/redirects
      - title: SEO Guide
        url: /guides/seo
      - title: Performance
        url: /guides/performance
      - title: Routing
        url: /guides/routing
      - title: Architecture
        url: /guides/architecture
      - title: API Reference
        url: /guides/api
      - title: Troubleshooting
        url: /guides/troubleshooting
      - title: Migration Guide
        url: /guides/migration
      - title: Advanced Islands
        url: /guides/advanced-islands
      - title: Structured Data
        url: /guides/structured-data
      - title: Build Optimization
        url: /guides/build-optimization
      - title: Advanced Proxy
        url: /guides/proxy
  - title: Community
    folder: community
    items:
      - title: Examples
        url: /guides/examples
      - title: Content Style
        url: /guides/content-style
      - title: Contributing
        url: /guides/contributing
      - title: Changelog
        url: /guides/changelog
      - title: Roadmap
        url: /guides/roadmap
  - title: GitHub
    url: https://github.com/dhaupin/prestruct
    external: true

# Theme - GitHub Pages default
theme: jekyll-theme-minimal

# Use default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Use pretty URLs (/page/ instead of /page.html)
permalink: pretty

# Markdown config
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude pagefind binary from Jekyll build (it's downloaded in CI)
exclude:
  - pagefind
  - pagefind-*.tar.gz
