# prestruct docs configuration
# GitHub Pages will auto-render this with Jekyll

title: prestruct
description: Static site generation for Cloudflare Pages - Documentation
baseurl: "/prestruct"
url: "https://dhaupin.github.io"
show_downloads: false

# Navigation structure
nav:
  - title: Home
    url: /
  - title: Guides
    folder: guides
    items:
      - title: SEO Guide
        url: /guides/seo
      - title: Performance
        url: /guides/performance
      - title: Routing
        url: /guides/routing
  - title: GitHub
    url: https://github.com/dhaupin/prestruct
    external: true

# Theme - GitHub Pages default
theme: jekyll-theme-minimal

# Use default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Use pretty URLs (/page/ instead of /page.html)
permalink: pretty

# Markdown config
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge