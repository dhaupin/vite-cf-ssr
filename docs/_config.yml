# prestruct docs configuration
# GitHub Pages will auto-render this with Jekyll

title: prestruct
description: Static site generation for Cloudflare Pages - Documentation
baseurl: "/prestruct"
url: "https://dhaupin.github.io"
show_downloads: false

# Theme - GitHub Pages default
theme: jekyll-theme-minimal

# Use pretty URLs (/page/ instead of /page.html)
permalink: pretty

# Markdown config
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge