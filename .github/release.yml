# .github/release.yml
# -------------------
# Controls how GitHub auto-generates release notes (the "Generate release notes"
# button and generate_release_notes: true in the workflow).
# Categorizes PRs and commits into sections in the release body.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: Breaking changes
      labels:
        - breaking
    - title: New features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other changes
      labels:
        - '*'
