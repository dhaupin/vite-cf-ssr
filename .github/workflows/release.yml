# release.yml
# -----------
# Fires when a version tag (v*.*.*) is pushed to main.
# Zips the /init directory and publishes a GitHub release.
#
# After this release is published, sync-example.yml fires automatically
# to copy the new init files into /example and redeploy the live site.
#
# To release:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Write version into init/VERSION
        run: echo "${{ env.VERSION }}" > init/VERSION

      - name: Build release archive
        run: |
          ARCHIVE="prestruct-${{ env.VERSION }}.zip"
          zip -r "${ARCHIVE}" init/ README.md AGENTS.md SCOPE.md CONTENT.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Prestruct ${{ env.VERSION }}"
          body: |
            ## Prestruct ${{ env.VERSION }}

            ### What's in this release

            | File | Purpose |
            |------|---------|
            | `init/scripts/inject-brand.js` | Injects global SEO meta into `dist/index.html` |
            | `init/scripts/prerender.js` | Renders each route to static HTML, generates sitemap + 404 |
            | `init/src/hooks/usePageMeta.js` | Keeps head tags in sync on client-side navigation |
            | `init/ssr.config.js` | Starter config template: routes, meta, JSON-LD |
            | `init/src/AppLayout.jsx` | Template: routes + layout, no BrowserRouter |
            | `init/index.html` | Shell template: meta injected at build time |
            | `init/public/_redirects` | 301 redirects created at build time |
            | `init/public/_headers | Cache control headers for build and CDN assets |

            ### Quick start

            ```bash
            # 1. Copy engine files into your app
            cp init/scripts/inject-brand.js   your-app/scripts/
            cp init/scripts/prerender.js       your-app/scripts/
            cp init/src/hooks/usePageMeta.js   your-app/src/hooks/

            # 2. Copy starter templates
            cp init/ssr.config.js    your-app/ssr.config.js
            cp init/AppLayout.jsx    your-app/src/AppLayout.jsx
            cp init/index.html       your-app/index.html
            ```

            See [README.md](README.md) and the [live example](https://prestruct.creadev.org) for full integration docs.
          files: ${{ env.ARCHIVE }}
          fail_on_unmatched_files: true
          generate_release_notes: true
