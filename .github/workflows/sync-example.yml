# sync-example.yml
# ----------------
# Fires after a GitHub release is published (triggered by release.yml).
# Copies the engine and template files from /init into /example so the live site
# (prestruct.creadev.org) always runs a known stable release.
#
# What gets synced:
#   Engine files (copy-once, never edit):
#     init/scripts/inject-brand.js  ->  example/scripts/inject-brand.js
#     init/scripts/prerender.js     ->  example/scripts/prerender.js
#     init/src/hooks/usePageMeta.js ->  example/src/hooks/usePageMeta.js
#     init/src/islands.js           ->  example/src/islands.js
#
#   Template files (wired in AppLayout -- kept in sync with init):
#     init/src/AppIslands.jsx       ->  example/src/AppIslands.jsx
#     init/src/AppLayout.jsx        ->  example/src/AppLayout.jsx
#     init/src/main.jsx             ->  example/src/main.jsx
#
#   Note: example/src/AppLayout.jsx has example-specific routes and nav,
#   so this sync will overwrite those. If the example site has diverged
#   intentionally, skip this workflow and update manually.
#
# After the commit, CF Pages detects the push and redeploys automatically.

name: Sync example to release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v0.2.3). Defaults to latest.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=$(cat init/VERSION)" >> $GITHUB_ENV
          fi

      - name: Sync files from init into example
        run: |
          # Engine files
          cp init/scripts/inject-brand.js    example/scripts/inject-brand.js
          cp init/scripts/prerender.js       example/scripts/prerender.js
          cp init/src/hooks/usePageMeta.js   example/src/hooks/usePageMeta.js
          cp init/src/islands.js             example/src/islands.js
          # Template files
          cp init/src/AppIslands.jsx         example/src/AppIslands.jsx
          cp init/src/main.jsx               example/src/main.jsx
          # Note: AppLayout.jsx is intentionally NOT synced -- the example site
          # has its own routes, nav, and branding that differ from the blank template.
          echo "Synced from ${{ env.VERSION }}"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add example/scripts/inject-brand.js \
                  example/scripts/prerender.js \
                  example/src/hooks/usePageMeta.js \
                  example/src/islands.js \
                  example/src/AppIslands.jsx \
                  example/src/main.jsx
          git commit -m "chore: sync example to ${{ env.VERSION }}"
          git push origin HEAD:main

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "example/ already matches ${{ env.VERSION }}, nothing to commit."
