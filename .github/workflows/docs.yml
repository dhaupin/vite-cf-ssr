name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Jekyll
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 1

      - name: Install dependencies
        working-directory: docs
        run: bundle install

      - name: Download Pagefind
        working-directory: docs
        run: |
          VERSION=$(curl -sL "https://api.github.com/repos/Pagefind/pagefind/releases/latest" | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sL "https://github.com/Pagefind/pagefind/releases/download/v${VERSION}/pagefind-v${VERSION}-x86_64-unknown-linux-musl.tar.gz" -o pagefind.tar.gz
          tar -xzf pagefind.tar.gz
          rm pagefind.tar.gz

      - name: Jekyll build
        working-directory: docs
        run: |
          bundle exec jekyll build
          echo "=== Site structure ==="
          find _site -name "*.html" | head -10

      - name: Index search with Pagefind
        working-directory: docs
        run: |
          echo "=== Pagefind binary ==="
          ls -la pagefind
          file pagefind
          echo "=== Running Pagefind ==="
          ./pagefind --site _site 2>&1 || echo "Pagefind failed with code $?"
          echo "=== Checking output ==="
          ls -la _site/pagefind/ 2>/dev/null || echo "No pagefind output dir"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_site'

  # Deployment job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4